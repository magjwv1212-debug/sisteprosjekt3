<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        body {
            background-color: rgb(0, 0, 0);
        }

        img {
            display: block;
            width: 100%;
        }

        header {
            height: 75px;
            width: 100%;
            background-color: rgb(0, 0, 0);
            position: fixed;
            z-index: 5;
            border-bottom: 1px red solid;
            color: rgba(255, 255, 255, 0.641);
            display: flex;
            align-items: center;
            justify-content: space-between;

        }

        #er {
            color: white;
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;

        }

        nav {
            width: 30%;
            display: flex;
            align-items: center;
            justify-content: space-around;

        }

        nav p:hover {
            opacity: 0.8;
            border-bottom: 1px solid red;
        }

        a {
            text-decoration: none;
            color: white;

        }

        #rød {
            color: red;
            margin-right: 5px;
        }

        #en {
            height: 60vh;
            background-color: rgba(20, 20, 20, 0.892);
            display: flex;
            align-items: center;
        }

        h1 {
            color: rgb(0, 0, 0);
            -webkit-text-stroke: 1px red;
            font-size: 70px;


        }

        .boks {
            height: 40vh;
            

        }
    </style>
</head>

<body>
    <header>

        <div id="er"> <a href="Index.html"><span id="rød"> MAN </span>UTD </div></a>

        <nav>
            <p>SPILLERE</p>

    </header>
    <section id="en">

        </div>

    </section>

</body>

</html>
